<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interests | Priyansha Gupta</title>
    <link rel="stylesheet" href="interests.css">
    <style>
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            color: #5a4a4a;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .card {
            background: white;
            width: 180px;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #f0e0e0;
        }
        .icon {
            font-size: 2.5rem;
        }
        .card h3 {
            color: #7a5a5a;
            margin: 10px 0;
        }
        .card p {
            color: #a88282;
            font-size: 0.8rem;
        }
        .travel-pics {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .travel-pics img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #f0d0d0;
        }
    </style>
</head>
<body>

    <div style="background: #fff5f5; padding: 15px 0; text-align: center; border-bottom: 1px solid #f0dfdf;">
        <a href="index.html" style="margin: 0 10px; color: #7a5a5a; text-decoration: none;">Home</a>
        <a href="about.html" style="margin: 0 10px; color: #7a5a5a; text-decoration: none;">About</a>
        <a href="skills.html" style="margin: 0 10px; color: #7a5a5a; text-decoration: none;">Skills</a>
        <a href="interests.html" style="margin: 0 10px; color: #7a5a5a; text-decoration: none;">Interests</a>
        <a href="contact.html" style="margin: 0 10px; color: #7a5a5a; text-decoration: none;">Contact</a>
    </div>

    <div class="container">
        <h1>My Interests</h1>
        <div class="grid">
            <div class="card">
                <div class="icon">🎨</div>
                <h3>Drawing</h3>
                <p>Love to draw in free time.</p>
            </div>
            <div class="card">
                <div class="icon">🖊️</div>
                <h3>Writing</h3>
                <p>Enjoy handwriting practice.</p>
            </div>
            <div class="card">
                <div class="icon">🏹</div>
                <h3>Archery</h3>
                <p>Fun and focused.</p>
            </div>
            <div class="card">
                <div class="icon">🎻</div>
                <h3>Music</h3>
                <p>Play instruments sometimes.</p>
            </div>
            <div class="card">
                <div class="icon">🌇</div>
                <h3>Travelling</h3>
                <p>Exploring new places with the person I love.</p>
            </div>
        </div>

        <div class="travel-pics">
            <img src="p2.jpg" alt="Travel picture 1">
            <img src="p3.jpg" alt="Travel picture 2">
        </div>
    </div>

    <footer style="background: #fff0f0; text-align: center; padding: 15px; color: #a88282; margin-top: 40px;">
        <p>&copy; 2026 Priyansha Shrestha Gupta</p>
    </footer>

</body>
</html>
